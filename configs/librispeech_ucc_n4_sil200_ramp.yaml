project:
  output_dir: runs
  artifacts_dir: artifacts

data:
  kind: librispeech
  librispeech:
    root: data/librispeech
    raw_dir: data/librispeech/raw
    extracted_dir: data/librispeech/LibriSpeech
    manifests_dir: data/librispeech/manifests
    splits:
      train: train-clean-100
      dev_clean: dev-clean
      dev_other: dev-other
      test_clean: test-clean
      test_other: test-other

model:
  pretrained_name: facebook/wav2vec2-base-960h
  gradient_checkpointing: true
  mask_time_prob: 0.05
  mask_time_length: 10

train:
  seed: 1337
  determinism: warn
  device: auto
  amp: true
  # Match baseline total optimization steps.
  max_steps: 20000
  eval_every_steps: 1000
  log_every_steps: 50
  batch_size: 2
  grad_accum_steps: 8
  lr: 3.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  max_grad_norm: 1.0
  num_workers: 4
  save_best_metric: dev_clean_wer
  ucc:
    enabled: true
    target_n: 4
    schedule: ramp
    rampup_fraction: 0.3
    boundary_silence_sec: 0.2

experiments:
  - name: ucc_n4_sil200_ramp
